name: Nightly Build

on:
  schedule:
    # Every day at 4:00 AM UTC
    - cron: '0 4 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  check-changes:
    name: Check for changes
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for new commits since last nightly tag
        id: check
        run: |
          # Always build on manual trigger
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Manual trigger — building"
            exit 0
          fi

          # Check if nightly tag exists
          if git rev-parse nightly >/dev/null 2>&1; then
            LAST_BUILD=$(git rev-list -1 nightly)
            HEAD=$(git rev-parse HEAD)
            if [ "$LAST_BUILD" = "$HEAD" ]; then
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
              echo "No changes since last nightly build — skipping"
            else
              echo "has_changes=true" >> "$GITHUB_OUTPUT"
              echo "Changes detected since last nightly build"
            fi
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "No previous nightly tag — building"
          fi

  build-dmg:
    name: Build Signed DMG
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"

          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Prepare Python bundle
        run: |
          brew install zstd
          ./Scripts/prepare_python.sh

      - name: Sign Python bundle binaries
        run: |
          PYTHON_DIR="Aerialist/Aerialist/Resources/python"
          echo "Re-signing Python binaries with Developer ID..."
          # Sign all .so, .dylib files and the python binary with Developer ID
          find "$PYTHON_DIR" \( -name "*.so" -o -name "*.dylib" \) -type f | while read -r f; do
            codesign --force --sign "Developer ID Application" \
              --keychain "$KEYCHAIN_PATH" \
              --options runtime \
              --timestamp \
              "$f" 2>/dev/null || true
          done
          # Sign the python3 binary itself
          find "$PYTHON_DIR/bin" -name "python3*" -type f | while read -r f; do
            codesign --force --sign "Developer ID Application" \
              --keychain "$KEYCHAIN_PATH" \
              --options runtime \
              --timestamp \
              "$f" 2>/dev/null || true
          done
          echo "Python bundle signing complete"

      - name: Build app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild build \
            -project Aerialist/Aerialist.xcodeproj \
            -scheme Aerialist \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            ENABLE_HARDENED_RUNTIME=YES \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH --timestamp --options runtime"

      - name: Create DMG
        run: |
          APP_PATH="build/DerivedData/Build/Products/Release/Aerialist.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "Error: Aerialist.app not found at $APP_PATH"
            find build/DerivedData -name "Aerialist.app" -type d 2>/dev/null
            exit 1
          fi

          # Verify code signature
          codesign --verify --deep --strict "$APP_PATH"
          echo "Code signature verified"

          # Create staging directory for DMG contents
          DMG_DIR="build/dmg-staging"
          mkdir -p "$DMG_DIR"
          cp -R "$APP_PATH" "$DMG_DIR/"

          # Create a symlink to /Applications for drag-install
          ln -s /Applications "$DMG_DIR/Applications"

          # Get version info
          VERSION=$(date -u +"%Y.%m.%d")
          SHORT_SHA=$(git rev-parse --short HEAD)
          DMG_NAME="Aerialist-nightly-${VERSION}-${SHORT_SHA}.dmg"

          # Create DMG
          hdiutil create \
            -volname "Aerialist" \
            -srcfolder "$DMG_DIR" \
            -ov \
            -format UDZO \
            "build/${DMG_NAME}"

          # Sign the DMG itself
          codesign --force --sign "Developer ID Application" \
            --keychain "$KEYCHAIN_PATH" \
            --timestamp \
            "build/${DMG_NAME}"

          echo "DMG_NAME=${DMG_NAME}" >> "$GITHUB_ENV"
          echo "DMG_PATH=build/${DMG_NAME}" >> "$GITHUB_ENV"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Submit for notarization (30 minute timeout)
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 30m 2>&1 | tee /tmp/notarize-output.txt

          # Get submission ID and fetch detailed log if it failed
          SUBMISSION_ID=$(grep 'id:' /tmp/notarize-output.txt | head -1 | awk '{print $2}')
          if grep -q "Invalid" /tmp/notarize-output.txt; then
            echo "Notarization failed — fetching detailed log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              /tmp/notarize-log.json 2>&1 || true
            cat /tmp/notarize-log.json
            exit 1
          fi

          # Staple the notarization ticket
          xcrun stapler staple "$DMG_PATH"
          echo "Notarization complete and stapled"

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DMG_NAME }}
          path: ${{ env.DMG_PATH }}
          retention-days: 30

      - name: Update nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          body: |
            Automated nightly build from `main` branch.

            **Commit:** ${{ github.sha }}
            **Built:** ${{ github.event.repository.updated_at || github.event.head_commit.timestamp }}

            This build is signed and notarized by Apple.
          prerelease: true
          files: ${{ env.DMG_PATH }}
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
