name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Prepare Python bundle
        run: |
          brew install zstd
          ./Scripts/prepare_python.sh

      - name: Build and Test
        run: |
          xcodebuild test \
            -project Aerialist/Aerialist.xcodeproj \
            -scheme Aerialist \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color || exit ${PIPESTATUS[0]}

      - name: Build CLI
        run: |
          xcodebuild build \
            -project Aerialist/Aerialist.xcodeproj \
            -scheme AerialistCLI \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color || exit ${PIPESTATUS[0]}
